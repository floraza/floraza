<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:240px;height:100vh;background:#2e7d32;color:white;padding:20px;position:fixed;
}
.logo-box{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.logo-box img{width:40px;}

.sidebar a{
display:block;color:white;text-decoration:none;margin:10px 0;padding:10px;border-radius:8px;
}
.sidebar a:hover{background:#1b5e20;}

/* Main */
.main{margin-left:260px;padding:20px;width:100%;}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px;
}

/* Cards */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;padding:20px;border-radius:15px;text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.card p{
font-size:22px;color:#2e7d32;font-weight:bold;
}
</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo-box">
<img src="logo.png">
<h3>Floraza</h3>
</div>

<a href="dashboard.html">Dashboard</a> <a href="staff.html">Staff</a> <a href="farmers.html">Farmers</a> <a href="sales.html">Sales</a> <a href="delivery.html">Delivery</a> <a href="inventory.html">Inventory</a> <a href="incentives.html">Performance Incentives</a> <a href="activities.html">Activities</a> <a href="gis-map.html">GIS Map</a> <a href="reports.html">Reports</a> <a href="settings.html">Settings</a>

</div>

<!-- Main -->

<div class="main">

<div class="header">
📊 Floraza Dashboard
</div>

<div class="grid">

<div class="card">
<h3>Total Farmers</h3>
<p id="farmers">0</p>
</div>

<div class="card">
<h3>Total Plants</h3>
<p id="plants">0</p>
</div>

<div class="card">
<h3>Total Sales ₹</h3>
<p id="sales">0</p>
</div>

<div class="card">
<h3>Total Incentives ₹</h3>
<p id="incentives">0</p>
</div>

<div class="card">
<h3>Total Deliveries</h3>
<p id="delivery">0</p>
</div>

<div class="card">
<h3>Total Activities</h3>
<p id="activities">0</p>
</div>

<div class="card">
<h3>Monthly Visits</h3>
<p id="monthly">0</p>
</div>

</div>

</div>

<script>

/* Protect */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* Load Data */
let farmers = JSON.parse(localStorage.getItem("farmers")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let delivery = JSON.parse(localStorage.getItem("delivery")) || [];
let activities = JSON.parse(localStorage.getItem("activities")) || [];

/* Farmers */
document.getElementById("farmers").innerText = farmers.length;

/* Plants */
let totalPlants = farmers.reduce((sum,f)=>sum+(parseInt(f.plants)||0),0);
document.getElementById("plants").innerText = totalPlants;

/* Sales */
let totalSales = sales.reduce((sum,s)=>sum+(parseFloat(s.amount)||0),0);
document.getElementById("sales").innerText = totalSales.toFixed(0);

/* Incentives */
let totalIncentives = totalSales * 0.2;
document.getElementById("incentives").innerText = totalIncentives.toFixed(0);

/* Delivery */
document.getElementById("delivery").innerText = delivery.length;

/* Activities */
document.getElementById("activities").innerText = activities.length;

/* Monthly Visits */
let now = new Date();

let monthly = activities.filter(a=>{
let d = new Date(a.date);
return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
});

document.getElementById("monthly").innerText = monthly.length;

</script>

</body>
</html>
