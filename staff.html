<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Staff</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:230px;height:100vh;background:#2e7d32;
color:white;padding:20px;position:fixed;
}

.sidebar h2{margin-bottom:20px;}

.sidebar a{
display:block;color:white;text-decoration:none;
margin:10px 0;padding:10px;border-radius:8px;
}

.sidebar a:hover{background:#1b5e20;}

/* Main */
.main{margin-left:250px;padding:20px;width:100%;}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;
border-radius:10px;text-align:center;
margin-bottom:20px;
}

/* Box */
.box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* Inputs */
input,select{
padding:10px;margin:5px;width:200px;
}

/* Button */
button{
padding:10px 15px;background:#2e7d32;
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Table */
table{width:100%;border-collapse:collapse;margin-top:10px;}
th{background:#2e7d32;color:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:center;}

.success{
color:green;margin-top:10px;
}
</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">
<h2>🌱 Floraza</h2>
<a href="dashboard.html">Dashboard</a>
<a href="staff.html">Staff</a>
<a href="farmers.html">Farmers</a>
<a href="sales.html">Sales</a>
<a href="delivery.html">Delivery</a>
</div>

<!-- Main -->

<div class="main">

<div class="header">👷‍♂️ Field Staff Management</div>

<!-- Add Staff -->

<div class="box">
<h3>Register New Staff</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="district" placeholder="District">
<input type="password" id="password" placeholder="Password">

<select id="role">
<option>Staff</option>
<option>Marketing</option>
</select>

<button onclick="register()">Register Staff</button>

<p class="success" id="msg"></p>

</div>

<!-- Staff List -->

<div class="box">
<h3>Staff List</h3>

<table>
<tr>
<th>Staff ID</th>
<th>Name</th>
<th>Phone</th>
<th>District</th>
<th>Role</th>
</tr>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

/* Protect Page */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* Generate ID */
function generateUsername(){

let last = localStorage.getItem("staffCounter") || 0;

last = parseInt(last) + 1;

localStorage.setItem("staffCounter", last);

return "FLZ3" + String(last).padStart(5,'0');
}

/* Load Staff */
let staffList = JSON.parse(localStorage.getItem("staff")) || [];

function loadStaff(){

document.getElementById("table").innerHTML="";

staffList.forEach(s=>{
document.getElementById("table").innerHTML+=`
<tr>
<td>${s.username}</td>
<td>${s.name}</td>
<td>${s.phone}</td>
<td>${s.district}</td>
<td>${s.role}</td>
</tr>
`;
});

}

loadStaff();

/* Register */
function register(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let district=document.getElementById("district").value;
let password=document.getElementById("password").value;
let role=document.getElementById("role").value;

if(!name || !phone || !password){
alert("Fill all fields");
return;
}

// Auto ID
let username = generateUsername();

let newStaff = {name,phone,district,username,password,role};

staffList.push(newStaff);
localStorage.setItem("staff", JSON.stringify(staffList));

/* Add to login users */
let users = JSON.parse(localStorage.getItem("users")) || [];
users.push(newStaff);
localStorage.setItem("users", JSON.stringify(users));

loadStaff();

document.getElementById("msg").innerText =
"Staff Registered. ID: " + username;

/* Clear */
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("district").value="";
document.getElementById("password").value="";
}

</script>

</body>
</html>
