<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body {
    background: linear-gradient(135deg,#e8f5e9,#ffffff);
}

/* Sidebar */
.sidebar {
    width:230px;height:100vh;position:fixed;
    background:#2e7d32;color:white;padding:20px;
}

.sidebar h2 {margin-bottom:30px;}

.sidebar a {
    display:block;color:white;text-decoration:none;
    padding:10px;margin:10px 0;border-radius:8px;
}

.sidebar a:hover {background:#1b5e20;}

/* Main */
.main {margin-left:250px;padding:20px;}

/* Header */
.header {
    background:#388e3c;color:white;padding:15px;
    border-radius:10px;text-align:center;
    font-size:22px;margin-bottom:20px;
}

/* Card */
.box {
    background:white;padding:20px;border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

/* Cards */
.cards {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card {
    background:white;padding:20px;border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h3 {margin-bottom:10px;}
.card p {font-size:22px;color:#2e7d32;font-weight:bold;}

input,select {
    padding:10px;margin:5px;width:200px;
}

button {
    padding:10px 15px;background:#2e7d32;
    color:white;border:none;border-radius:8px;
    cursor:pointer;
}

/* Table */
table {
    width:100%;margin-top:10px;border-collapse:collapse;
}
th {background:#2e7d32;color:white;}
th,td {padding:10px;border:1px solid #ddd;text-align:center;}

@media(max-width:768px){
.sidebar{display:none;}
.main{margin-left:0;}
}
</style>

</head>

<body>

<div class="sidebar">
<h2>🌱 Floraza</h2>
<a>Dashboard</a>
<a>Farmers</a>
<a>Sales</a>
<a>Reports</a>
</div>

<div class="main">

<div class="header">Floraza Marketing Dashboard</div>

<!-- PROFILE -->

<div class="box">
<h3>Profile</h3>
<input id="name" placeholder="Name">
<input id="role" placeholder="Role">
<button onclick="saveProfile()">Save</button>
<p id="profile"></p>
</div>

<!-- SALES INPUT -->

<div class="box">
<h3>Add Sales</h3>

<select id="product">
<option value="1750">Nutri Jack Powder</option>
<option value="250">Jackfruit Plant</option>
<option value="500">Potassium Humate</option>
<option value="400">Seaweed Gel</option>
</select>

<input type="number" id="qty" placeholder="Quantity">
<button onclick="addSales()">Add Sale</button>

<table>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Commission</th>
</tr>
<tbody id="table"></tbody>
</table>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
<h3>💰 Total Sales</h3>
<p id="sales">0</p>
</div>

<div class="card">
<h3>💸 Commission</h3>
<p id="commission">0</p>
</div>

</div>

</div>

<script>

let totalSales = 0;
let totalCommission = 0;

/* PROFILE SAVE */
function saveProfile(){
let name = document.getElementById("name").value;
let role = document.getElementById("role").value;

localStorage.setItem("name",name);
localStorage.setItem("role",role);

document.getElementById("profile").innerText =
name + " (" + role + ")";
}

/* ADD SALES */
function addSales(){

let productText = document.getElementById("product").selectedOptions[0].text;
let price = parseInt(document.getElementById("product").value);
let qty = parseInt(document.getElementById("qty").value);

if(!qty){alert("Enter quantity");return;}

let amount = price * qty;

let comm = 0;
if(price==1750) comm = 400*qty;
if(price==250) comm = 8*qty;
if(price==500) comm = 50*qty;
if(price==400) comm = 50*qty;

totalSales += amount;
totalCommission += comm;

document.getElementById("sales").innerText = totalSales;
document.getElementById("commission").innerText = totalCommission;

document.getElementById("table").innerHTML += `
<tr>
<td>${productText}</td>
<td>${qty}</td>
<td>₹${amount}</td>
<td>₹${comm}</td>
</tr>`;

// SAVE
localStorage.setItem("sales",totalSales);
localStorage.setItem("commission",totalCommission);
localStorage.setItem("table",document.getElementById("table").innerHTML);
}

/* LOAD DATA */
window.onload = function(){

let s = localStorage.getItem("sales");
let c = localStorage.getItem("commission");
let t = localStorage.getItem("table");
let name = localStorage.getItem("name");
let role = localStorage.getItem("role");

if(s){totalSales=s;document.getElementById("sales").innerText=s;}
if(c){totalCommission=c;document.getElementById("commission").innerText=c;}
if(t){document.getElementById("table").innerHTML=t;}
if(name){
document.getElementById("profile").innerText =
name + " (" + role + ")";
}

}

</script>

</body>
</html>
