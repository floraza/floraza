<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #e8f5e9, #ffffff);
}

/* Sidebar */
.sidebar {
    width: 230px;
    height: 100vh;
    position: fixed;
    background: #2e7d32;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}

.sidebar a:hover {
    background: #1b5e20;
}

/* Main */
.main {
    margin-left: 250px;
    padding: 20px;
}

/* Header */
.header {
    background: #388e3c;
    color: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
}

/* Profile Card */
.profile {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

.profile input {
    padding: 10px;
    margin: 5px;
    width: 200px;
}

.profile button {
    padding: 10px 15px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 8px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card h3 {
    margin-bottom: 10px;
}

.card p {
    font-size: 24px;
    font-weight: bold;
    color: #2e7d32;
}

/* Mobile */
@media(max-width:768px){
    .sidebar {
        display: none;
    }
    .main {
        margin-left: 0;
    }
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🌱 Floraza</h2>
    <a href="#">Dashboard</a>
    <a href="#">Farmers</a>
    <a href="#">Plants</a>
    <a href="#">Sales</a>
    <a href="#">Employees</a>
</div>

<!-- Main -->
<div class="main">

    <div class="header">
        Floraza Marketing Dashboard
    </div>

    <!-- Profile -->
    <div class="profile">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="position" placeholder="Position">
        <button onclick="saveProfile()">Save</button>

        <p id="display"></p>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>👨‍🌾 Total Farmers</h3>
            <p id="farmers">0</p>
        </div>

        <div class="card">
            <h3>🌱 Total Plants</h3>
            <p id="plants">0</p>
        </div>

        <div class="card">
            <h3>🌍 Total Area</h3>
            <p id="area">0</p>
        </div>

        <div class="card">
            <h3>💰 Sales ₹</h3>
            <p id="sales">0</p>
        </div>

        <div class="card">
            <h3>📦 Fertilizer</h3>
            <p id="fertilizer">0</p>
        </div>

        <div class="card">
            <h3>💸 Commission ₹</h3>
            <p id="commission">0</p>
        </div>
    </div>

</div>

<script>

/* Save Profile */
function saveProfile() {
    let name = document.getElementById("name").value;
    let position = document.getElementById("position").value;

    localStorage.setItem("name", name);
    localStorage.setItem("position", position);

    document.getElementById("display").innerHTML =
        "Name: " + name + " | Position: " + position;
}

/* Load Profile */
window.onload = function() {
    let name = localStorage.getItem("name");
    let position = localStorage.getItem("position");

    if(name){
        document.getElementById("display").innerHTML =
            "Name: " + name + " | Position: " + position;
    }
}

</script>

</body>
</html>
