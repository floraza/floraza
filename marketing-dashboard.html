<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Marketing Dashboard</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#e8f5e9,#ffffff);
}

/* HEADER */
.header {
  background: linear-gradient(90deg,#1b5e20,#43a047);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* CONTAINER */
.container {
  padding: 25px;
}

/* PROFILE */
.profile {
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.profile img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
}

.profile input {
  padding: 10px;
  margin: 5px;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #1b5e20;
}

/* CARDS */
.cards {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.8);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  backdrop-filter: blur(5px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h2 {
  margin: 10px 0;
  color: #2e7d32;
}

/* SECTION */
.section {
  margin-top: 30px;
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* TABLE */
table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th {
  background: #2e7d32;
  color: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}
</style>

</head>

<body>

<div class="header">🌱 Floraza Marketing Dashboard</div>

<div class="container">

<!-- PROFILE -->

<div class="profile">
  <img id="preview" src="https://via.placeholder.com/80">

  <div>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="position" placeholder="Position">
    <input type="file" onchange="loadImage(event)">
    <br>
    <button onclick="saveProfile()">Save</button>
    <p id="profileText"></p>
  </div>
</div>

<!-- CARDS -->

<div class="cards">
  <div class="card">Total Farmers<h2 id="farmers">0</h2></div>
  <div class="card">Total Area<h2 id="area">0</h2></div>
  <div class="card">Total Plants<h2 id="plants">0</h2></div>
  <div class="card">Fertilizer Sold<h2 id="fertilizer">0</h2></div>
  <div class="card">Sales ₹<h2 id="sales">0</h2></div>
  <div class="card">Commission ₹<h2 id="commission">0</h2></div>
</div>

<!-- ORDER -->

<div class="section">
<h3>Place Order</h3>

<select id="product">
<option value="nutri">Nutri Jack Powder</option>
<option value="plant">Jackfruit Plant</option>
<option value="humate">Potassium Humate</option>
<option value="seaweed">Seaweed Gel</option>
</select>

<input type="number" id="qty" placeholder="Quantity">
<button onclick="addOrder()">Add</button>

<table>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Commission</th>
</tr>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script>

// IMAGE PREVIEW
function loadImage(event){
  let img = document.getElementById("preview");
  img.src = URL.createObjectURL(event.target.files[0]);
}

// PROFILE SAVE
function saveProfile(){
  let name = document.getElementById("name").value;
  let pos = document.getElementById("position").value;

  document.getElementById("profileText").innerText =
    name + " (" + pos + ")";
}

// ORDER SYSTEM
let totalSales = 0;
let totalCommission = 0;

function addOrder(){

  let p = document.getElementById("product").value;
  let q = parseInt(document.getElementById("qty").value);

  if(!q) return alert("Enter qty");

  let price=0, comm=0;

  if(p=="nutri"){price=1750;comm=400;}
  if(p=="plant"){price=250;comm=8;}
  if(p=="humate"){price=500;comm=50;}
  if(p=="seaweed"){price=400;comm=50;}

  let amount = price*q;
  let c = comm*q;

  totalSales += amount;
  totalCommission += c;

  document.getElementById("sales").innerText = totalSales;
  document.getElementById("commission").innerText = totalCommission;

  document.getElementById("table").innerHTML += `
  <tr>
    <td>${p}</td>
    <td>${q}</td>
    <td>₹${amount}</td>
    <td>₹${c}</td>
  </tr>`;
}

</script>

</body>
</html>
