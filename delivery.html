<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Delivery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:240px;height:100vh;background:#2e7d32;color:white;padding:20px;position:fixed;
}

.logo-box{
display:flex;align-items:center;gap:10px;margin-bottom:20px;
}

.logo-box img{width:40px;}

.sidebar a{
display:block;color:white;text-decoration:none;margin:10px 0;padding:10px;border-radius:8px;
}

.sidebar a:hover{background:#1b5e20;}

/* Main */
.main{margin-left:260px;padding:20px;width:100%;}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px;
}

/* Box */
.box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select{
padding:10px;margin:5px;width:200px;
}

/* Button */
button{
padding:10px 15px;background:#2e7d32;color:white;border:none;border-radius:8px;cursor:pointer;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;padding:20px;border-radius:15px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.card p{
font-size:22px;color:#2e7d32;font-weight:bold;
}

/* Table */
table{width:100%;border-collapse:collapse;}
th{background:#2e7d32;color:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:center;}
</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo-box">
<img src="logo.png">
<h3>Floraza</h3>
</div>

<a href="dashboard.html">Dashboard</a> <a href="staff.html">Staff</a> <a href="farmers.html">Farmers</a> <a href="sales.html">Sales</a> <a href="delivery.html">Delivery</a> <a href="inventory.html">Inventory</a> <a href="mlm.html">MLM</a> <a href="gis-map.html">GIS Map</a> <a href="reports.html">Reports</a> <a href="settings.html">Settings</a>

</div>

<!-- Main -->

<div class="main">

<div class="header">
🚚 Delivery Management
</div>

<!-- Add Delivery -->

<div class="box">

<input id="name" placeholder="Customer Name">
<input id="location" placeholder="Location">

<select id="product">
<option>Nutri Jack Powder</option>
<option>Jackfruit Plant</option>
<option>Potassium Humate</option>
<option>Seaweed Gel</option>
</select>

<input type="number" id="qty" placeholder="Quantity">

<select id="staff"></select>

<select id="status">
<option>Pending</option>
<option>Dispatched</option>
<option>Delivered</option>
</select>

<button onclick="addDelivery()">Add Delivery</button>

</div>

<!-- Summary -->

<div class="cards">
<div class="card"><h3>Total Orders</h3><p id="orders">0</p></div>
<div class="card"><h3>Delivered</h3><p id="delivered">0</p></div>
</div>

<!-- Table -->

<div class="box">

<table>
<tr>
<th>Name</th>
<th>Location</th>
<th>Product</th>
<th>Qty</th>
<th>Status</th>
<th>Staff</th>
</tr>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

/* Protect */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* Load Staff */
let staffList = JSON.parse(localStorage.getItem("staff")) || [];

staffList.forEach(s=>{
document.getElementById("staff").innerHTML +=
`<option>${s.username}</option>`;
});

/* Data */
let deliveries = JSON.parse(localStorage.getItem("delivery")) || [];

/* Add */
function addDelivery(){

let d = {
name: document.getElementById("name").value,
location: document.getElementById("location").value,
product: document.getElementById("product").value,
qty: document.getElementById("qty").value,
status: document.getElementById("status").value,
staff: document.getElementById("staff").value
};

deliveries.push(d);

localStorage.setItem("delivery", JSON.stringify(deliveries));

load();

}

/* Load */
function load(){

document.getElementById("table").innerHTML="";

let total = deliveries.length;
let delivered = deliveries.filter(x=>x.status==="Delivered").length;

deliveries.forEach(d=>{
document.getElementById("table").innerHTML+=`
<tr>
<td>${d.name}</td>
<td>${d.location}</td>
<td>${d.product}</td>
<td>${d.qty}</td>
<td>${d.status}</td>
<td>${d.staff}</td>
</tr>
`;
});

document.getElementById("orders").innerText = total;
document.getElementById("delivered").innerText = delivered;

}

load();

</script>

</body>
</html>
