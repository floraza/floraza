<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body { margin: 0; font-family: Arial; display: flex; }

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    background: #0d47a1;
    color: white;
    padding: 20px;
}

.sidebar h2 { margin-bottom: 30px; }

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
    margin-bottom: 10px;
}

.sidebar a:hover {
    background: #1565c0;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
    background: #f4f6f8;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 220px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* FORM */
.form-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    padding: 10px;
    background: #1565c0;
    color: white;
    border: none;
    cursor: pointer;
}

/* LIST */
.list {
    margin-top: 20px;
}

.item {
    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>ADMIN PANEL</h2>
    <a href="#">Dashboard</a>
    <a href="#">Orders</a>
    <a href="#">Finance</a>
    <a href="#">Payouts</a>
    <a href="#">Users</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Admin Dashboard 💼</h2>

<!-- SUMMARY -->
<div class="cards">
    <div class="card">Total Sales ₹<span id="sales"></span></div>
    <div class="card">Total Commission ₹<span id="commission"></span></div>
    <div class="card">Net Profit ₹<span id="profit"></span></div>
    <div class="card">Plant Orders <span id="plants"></span></div>
</div>

<!-- PAYOUT -->
<div class="form-box">
<h3>Add Payout</h3>
<input id="name" placeholder="Farmer / Staff Name">
<input id="amount" type="number" placeholder="Amount">
<select id="type">
<option>Farmer</option>
<option>Staff</option>
</select>
<select id="status">
<option>Paid</option>
<option>Pending</option>
</select>
<button onclick="addPayout()">Save</button>
</div>

<!-- LISTS -->
<div class="list" id="ordersList"></div>
<div class="list" id="payoutList"></div>
<div class="list" id="staffList"></div>
<div class="list" id="farmerList"></div>

</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];
let commissions = JSON.parse(localStorage.getItem("commissions")) || [];
let staff = JSON.parse(localStorage.getItem("staff")) || [];
let farmers = JSON.parse(localStorage.getItem("farmers")) || [];
let payouts = JSON.parse(localStorage.getItem("payouts")) || [];

/* PRICE */
function price(p){
return {
"Nutri Jack Powder":1750,
"Jackfruit Plants":250,
"Potassium Humate":500,
"Seaweed Gel":400
}[p];
}

/* ADD PAYOUT */
function addPayout(){
payouts.push({
name:name.value,
amount:Number(amount.value),
type:type.value,
status:status.value,
date:new Date()
});

localStorage.setItem("payouts",JSON.stringify(payouts));
display();
}

/* DISPLAY */
function display(){

let sales=orders.reduce((s,o)=>s+(o.qty*price(o.product)),0);
let comm=commissions.reduce((s,c)=>s+c.amount,0);
let profit=sales-comm;

salesEl=document.getElementById("sales");
salesEl.innerText=sales;

commissionEl=document.getElementById("commission");
commissionEl.innerText=comm;

profitEl=document.getElementById("profit");
profitEl.innerText=profit;

plants.innerText=orders
.filter(o=>o.product==="Jackfruit Plants")
.reduce((s,o)=>s+o.qty,0);

/* LISTS */
ordersList.innerHTML="<h3>Orders</h3>"+orders.map(o=>
`<div class="item">${o.customer} - ${o.product} (${o.qty})</div>`).join("");

payoutList.innerHTML="<h3>Payouts</h3>"+payouts.map(p=>
`<div class="item">${p.name} ₹${p.amount} (${p.status})</div>`).join("");

staffList.innerHTML="<h3>Staff</h3>"+staff.map(s=>
`<div class="item">${s.name} - ${s.role}</div>`).join("");

farmerList.innerHTML="<h3>Farmers</h3>"+farmers.map(f=>
`<div class="item">${f.name} - ${f.area} acres</div>`).join("");
}

display();

</script>

</body>
</html>
