<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza GIS Map</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:230px;height:100vh;background:#2e7d32;
color:white;padding:20px;position:fixed;
}

.sidebar h2{margin-bottom:20px;}

.sidebar a{
display:block;color:white;text-decoration:none;
margin:10px 0;padding:10px;border-radius:8px;
}

.sidebar a:hover{background:#1b5e20;}

/* Main */
.main{margin-left:250px;padding:20px;width:100%;}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;
border-radius:10px;text-align:center;
margin-bottom:20px;
}

/* Box */
.box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* Inputs */
input{
padding:10px;margin:5px;width:200px;
}

/* Button */
button{
padding:10px 15px;background:#2e7d32;
color:white;border:none;border-radius:8px;
cursor:pointer;
}

/* Map */
#map{
width:100%;
height:500px;
border-radius:15px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">
<h2>🌱 Floraza</h2>
<a href="dashboard.html">Dashboard</a>
<a href="farmers.html">Farmers</a>
<a href="gis-map.html">GIS Map</a>
</div>

<!-- Main -->

<div class="main">

<div class="header">🌍 Plantation GIS Map</div>

<!-- Add Farmer -->

<div class="box">
<h3>Add Farmer Location</h3>

<input id="name" placeholder="Farmer Name">
<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">

<button onclick="addMarker()">Add Location</button>

<button onclick="getLocation()">📍 Use My Location</button>

</div>

<!-- Map -->

<div class="box">
<div id="map"></div>
</div>

</div>

<script>

if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

let map;
let markers = JSON.parse(localStorage.getItem("mapData")) || [];

/* Init Map */
function initMap(){
map = new google.maps.Map(document.getElementById("map"), {
center: {lat:13.0, lng:77.5},
zoom:6
});

// Load saved markers
markers.forEach(m=>{
createMarker(m);
});

}

/* Create Marker */
function createMarker(data){

let marker = new google.maps.Marker({
position:{lat:data.lat, lng:data.lng},
map:map,
title:data.name
});

let info = new google.maps.InfoWindow({
content: `<b>${data.name}</b>`
});

marker.addListener("click", ()=>{
info.open(map, marker);
});

}

/* Add Marker */
function addMarker(){

let name=document.getElementById("name").value;
let lat=parseFloat(document.getElementById("lat").value);
let lng=parseFloat(document.getElementById("lng").value);

if(!name || !lat || !lng){
alert("Fill all fields");
return;
}

let data = {name,lat,lng};

markers.push(data);
localStorage.setItem("mapData", JSON.stringify(markers));

createMarker(data);

}

/* Get GPS */
function getLocation(){

navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("lat").value = pos.coords.latitude;
document.getElementById("lng").value = pos.coords.longitude;
});

}

</script>

<!-- Google Maps API -->

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

</body>
</html>
