<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Farmers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:240px;height:100vh;background:#2e7d32;color:white;padding:20px;position:fixed;
}
.logo-box{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.logo-box img{width:40px;}

.sidebar a{
display:block;color:white;text-decoration:none;margin:10px 0;padding:10px;border-radius:8px;
}
.sidebar a:hover{background:#1b5e20;}

/* Main */
.main{margin-left:260px;padding:20px;width:100%;}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px;
}

/* Box */
.box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* Inputs */
input,select{
padding:10px;margin:5px;width:200px;
}

/* Button */
button{
padding:10px 15px;background:#2e7d32;color:white;border:none;border-radius:8px;cursor:pointer;
}

/* Table */
table{width:100%;border-collapse:collapse;}
th{background:#2e7d32;color:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:center;}

img{border-radius:50%;}
</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo-box">
<img src="logo.png">
<h3>Floraza</h3>
</div>

<a href="dashboard.html">Dashboard</a> <a href="staff.html">Staff</a> <a href="farmers.html">Farmers</a> <a href="sales.html">Sales</a> <a href="delivery.html">Delivery</a> <a href="inventory.html">Inventory</a> <a href="incentives.html">Performance Incentives</a> <a href="activities.html">Activities</a> <a href="gis-map.html">GIS Map</a> <a href="reports.html">Reports</a> <a href="settings.html">Settings</a>

</div>

<!-- Main -->

<div class="main">

<div class="header">
👨‍🌾 Farmer Management
</div>

<!-- Form -->

<div class="box">

<input id="name" placeholder="Farmer Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<input id="acres" placeholder="Land (Acres)">
<input id="plants" placeholder="Plants">

<select id="staff"></select>

<input type="file" id="photo" accept="image/*">

<button onclick="addFarmer()">Add Farmer</button>

</div>

<!-- Table -->

<div class="box">

<table>
<tr>
<th>ID</th>
<th>Photo</th>
<th>Name</th>
<th>Phone</th>
<th>Location</th>
<th>Acres</th>
<th>Plants</th>
<th>Staff</th>
</tr>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

/* Protect */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* Farmer ID Generator */
function generateFarmerID(){

let last = localStorage.getItem("farmerCounter") || 0;
last = parseInt(last) + 1;
localStorage.setItem("farmerCounter", last);

return "FRM" + String(last).padStart(5,'0');
}

/* Load Staff */
let staffList = JSON.parse(localStorage.getItem("staff")) || [];

staffList.forEach(s=>{
document.getElementById("staff").innerHTML +=
`<option>${s.username}</option>`;
});

/* Data */
let farmers = JSON.parse(localStorage.getItem("farmers")) || [];

/* Add Farmer */
function addFarmer(){

let file = document.getElementById("photo").files[0];

if(!file){
alert("Upload photo");
return;
}

let reader = new FileReader();

reader.onload = function(){

let farmer = {
id: generateFarmerID(),
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
location: document.getElementById("location").value,
acres: document.getElementById("acres").value,
plants: document.getElementById("plants").value,
staff: document.getElementById("staff").value,
photo: reader.result
};

farmers.push(farmer);

localStorage.setItem("farmers", JSON.stringify(farmers));

load();

/* Clear */
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("location").value="";
document.getElementById("acres").value="";
document.getElementById("plants").value="";
};

reader.readAsDataURL(file);

}

/* Load */
function load(){

let table = document.getElementById("table");
table.innerHTML="";

farmers.forEach(f=>{
table.innerHTML+=`
<tr>
<td>${f.id}</td>
<td><img src="${f.photo}" width="40"></td>
<td>${f.name}</td>
<td>${f.phone}</td>
<td>${f.location}</td>
<td>${f.acres}</td>
<td>${f.plants}</td>
<td>${f.staff}</td>
</tr>
`;
});

}

load();

</script>

</body>
</html>
