<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Farmers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:240px;height:100vh;background:#2e7d32;color:white;padding:20px;position:fixed;
}

.logo-box{
display:flex;align-items:center;gap:10px;margin-bottom:20px;
}

.logo-box img{width:40px;}

.sidebar a{
display:block;color:white;text-decoration:none;margin:10px 0;padding:10px;border-radius:8px;
}

.sidebar a:hover{background:#1b5e20;}

/* Main */
.main{
margin-left:260px;padding:20px;width:100%;
}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px;
}

/* Form */
.form-box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select{
padding:10px;margin:5px;width:200px;
}

/* Button */
button{
padding:10px 15px;background:#2e7d32;color:white;border:none;border-radius:8px;cursor:pointer;
}

/* Table */
table{width:100%;border-collapse:collapse;}
th{background:#2e7d32;color:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:center;}
</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo-box">
<img src="logo.png">
<h3>Floraza</h3>
</div>

<a href="dashboard.html">Dashboard</a> <a href="staff.html">Staff</a> <a href="farmers.html">Farmers</a> <a href="sales.html">Sales</a> <a href="delivery.html">Delivery</a> <a href="inventory.html">Inventory</a> <a href="mlm.html">MLM</a> <a href="gis-map.html">GIS Map</a> <a href="reports.html">Reports</a> <a href="settings.html">Settings</a>

</div>

<!-- Main -->

<div class="main">

<div class="header">
👨‍🌾 Farmer Management
</div>

<!-- Form -->

<div class="form-box">

<input id="name" placeholder="Farmer Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<input id="acres" placeholder="Land (Acres)">
<input id="plants" placeholder="Plants">

<select id="staff"></select>

<button onclick="addFarmer()">Add Farmer</button>

</div>

<!-- Table -->

<div class="form-box">

<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Location</th>
<th>Acres</th>
<th>Plants</th>
<th>Staff</th>
</tr>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

/* Protect Page */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* Load Staff */
let staffList = JSON.parse(localStorage.getItem("staff")) || [];

staffList.forEach(s=>{
document.getElementById("staff").innerHTML +=
`<option value="${s.username}">${s.username}</option>`;
});

/* Load Farmers */
let farmers = JSON.parse(localStorage.getItem("farmers")) || [];

function loadFarmers(){

document.getElementById("table").innerHTML="";

farmers.forEach(f=>{
document.getElementById("table").innerHTML+=`
<tr>
<td>${f.name}</td>
<td>${f.phone}</td>
<td>${f.location}</td>
<td>${f.acres}</td>
<td>${f.plants}</td>
<td>${f.staff}</td>
</tr>
`;
});

}

loadFarmers();

/* Add Farmer */
function addFarmer(){

let farmer = {
name: document.getElementById("name").value,
phone: document.getElementById("phone").value,
location: document.getElementById("location").value,
acres: document.getElementById("acres").value,
plants: document.getElementById("plants").value,
staff: document.getElementById("staff").value
};

farmers.push(farmer);

localStorage.setItem("farmers", JSON.stringify(farmers));

loadFarmers();

/* Clear */
document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("location").value="";
document.getElementById("acres").value="";
document.getElementById("plants").value="";
}

</script>

</body>
</html>
