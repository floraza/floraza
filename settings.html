<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Settings</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:240px;height:100vh;background:#2e7d32;color:white;padding:20px;position:fixed;
}

.logo-box{
display:flex;align-items:center;gap:10px;margin-bottom:20px;
}

.logo-box img{width:40px;}

.sidebar a{
display:block;color:white;text-decoration:none;margin:10px 0;padding:10px;border-radius:8px;
}

.sidebar a:hover{background:#1b5e20;}

.logout{
margin-top:20px;
background:red;
text-align:center;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* Main */
.main{margin-left:260px;padding:20px;width:100%;}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px;
}

/* Box */
.box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
padding:10px;margin:5px;width:200px;
}

/* Button */
button{
padding:10px 15px;background:#2e7d32;color:white;border:none;border-radius:8px;cursor:pointer;
}

.danger{
background:red;
}

.success{
color:green;margin-top:10px;
}
</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo-box">
<img src="logo.png">
<h3>Floraza</h3>
</div>

<a href="dashboard.html">Dashboard</a> <a href="staff.html">Staff</a> <a href="farmers.html">Farmers</a> <a href="sales.html">Sales</a> <a href="delivery.html">Delivery</a> <a href="inventory.html">Inventory</a> <a href="mlm.html">MLM</a> <a href="gis-map.html">GIS Map</a> <a href="reports.html">Reports</a> <a href="settings.html">Settings</a>

<div class="logout" onclick="logout()">Logout</div>

</div>

<!-- Main -->

<div class="main">

<div class="header">
⚙️ System Settings
</div>

<!-- Profile -->

<div class="box">
<h3>👤 Profile</h3>

<input id="name" placeholder="Name">
<input id="role" placeholder="Role">

<button onclick="saveProfile()">Save</button>

<p class="success" id="profileMsg"></p>
</div>

<!-- Change Password -->

<div class="box">
<h3>🔐 Change Password</h3>

<input type="password" id="oldPass" placeholder="Old Password">
<input type="password" id="newPass" placeholder="New Password">
<input type="password" id="confirmPass" placeholder="Confirm Password">

<button onclick="changePassword()">Update Password</button>

</div>

<!-- Reset -->

<div class="box">
<h3>⚠️ System Reset</h3>

<p>This will delete all data</p>

<button class="danger" onclick="resetSystem()">Reset System</button>

</div>

</div>

<script>

/* Protect */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* Save Profile */
function saveProfile(){

let name=document.getElementById("name").value;
let role=document.getElementById("role").value;

localStorage.setItem("profileName",name);
localStorage.setItem("profileRole",role);

document.getElementById("profileMsg").innerText="Profile Saved";

}

/* Change Password */
function changePassword(){

let old=document.getElementById("oldPass").value;
let newp=document.getElementById("newPass").value;
let con=document.getElementById("confirmPass").value;

let users=JSON.parse(localStorage.getItem("users"));

let current=JSON.parse(localStorage.getItem("currentUser"));

let user=users.find(u=>u.username===current.username);

if(user.password!==old){
alert("Wrong old password");
return;
}

if(newp!==con){
alert("Password mismatch");
return;
}

user.password=newp;

localStorage.setItem("users", JSON.stringify(users));

alert("Password updated");

}

/* Reset */
function resetSystem(){

if(confirm("Are you sure?")){

localStorage.clear();

alert("System Reset Done");

window.location.href="login.html";

}

}

/* Logout */
function logout(){
localStorage.removeItem("loggedIn");
window.location.href="login.html";
}

</script>

</body>
</html>
