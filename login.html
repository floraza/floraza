<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FLORAZA ORGANICS LTD</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #2e7d32, #66bb6a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN BOX */
.login-box {
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 320px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
    color: #2e7d32;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

.back {
    display: block;
    margin-top: 15px;
    text-decoration: none;
    color: #2e7d32;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>FLORAZA LOGIN</h2>

    <select id="role">
        <option value="">Select Role</option>
        <option value="admin">Admin</option>
        <option value="marketing">Marketing</option>
        <option value="farmer">Farmer</option>
    </select>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <a href="index.html" class="back">← Back to Website</a>
</div>

<script>

function login() {

    let role = document.getElementById("role").value;
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(role === "" || user === "" || pass === "") {
        alert("Please fill all fields");
        return;
    }

    // SIMPLE DEMO LOGIN
    if(role === "admin" && user === "admin" && pass === "123") {
        window.location.href = "admin-dashboard.html";
    }
    else if(role === "marketing" && pass === "123") {
        window.location.href = "marketing-dashboard.html";
    }
    else if(role === "farmer" && pass === "123") {
        window.location.href = "farmer-dashboard.html";
    }
    else {
        alert("Invalid login");
    }
}

</script>

</body>
</html>
