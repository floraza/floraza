<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #3f8f3f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Login Box */
.login-box {
    background: #fff;
    padding: 40px;
    width: 350px;
    border-radius: 10px;
    text-align: center;
}

.login-box h2 {
    color: #2e7d32;
    margin-bottom: 20px;
}

/* Inputs */
select, input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: #fff;
    border: none;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #1b5e20;
}

/* Back link */
.back-link {
    margin-top: 15px;
    display: block;
    color: #2e7d32;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>FLORAZA LOGIN</h2>

```
<!-- Role Selection -->
<select id="role">
    <option>Admin</option>
    <option>Marketing</option>
    <option>Farmer</option>
</select>

<!-- Inputs -->
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<!-- Login Button -->
<button onclick="loginUser()">Login</button>

<!-- Back -->
<a href="index.html" class="back-link">← Back to Website</a>
```

</div>

<script>
function loginUser() {
    let role = document.getElementById("role").value;
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // Admin Login
    if(role === "Admin") {
        if(username === "admin" && password === "1234") {
            window.location.href = "admin-dashboard.html";
        } else {
            alert("Invalid Admin Login");
        }
    }

    // Marketing Login
    else if(role === "Marketing") {
        if(username === "marketing" && password === "1234") {
            window.location.href = "marketing-dashboard.html";
        } else {
            alert("Invalid Marketing Login");
        }
    }

    // Farmer Login
    else {
        if(username === "farmer" && password === "1234") {
            window.location.href = "farmer-dashboard.html";
        } else {
            alert("Invalid Farmer Login");
        }
    }
}
</script>

</body>
</html>
