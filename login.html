<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#1b5e20,#66bb6a);
}

/* Left */
.left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.left img{
width:140px;
margin-bottom:15px;
filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
}

.left h2{margin-bottom:10px;}

.left p{opacity:0.9;}

/* Right */
.right{
flex:1;
background:white;
display:flex;
justify-content:center;
align-items:center;
border-radius:30px 0 0 30px;
}

/* Card */
.card{
width:350px;
}

.card h2{
text-align:center;
margin-bottom:20px;
color:#2e7d32;
}

/* Inputs */
input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

/* Password */
.pass{
position:relative;
}

.pass span{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

/* Button */
button{
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1b5e20;
}

/* Error */
#error{
color:red;
text-align:center;
margin-top:10px;
}

/* Link */
.back{
text-align:center;
margin-top:10px;
display:block;
color:#2e7d32;
text-decoration:none;
}

/* Mobile */
@media(max-width:768px){
body{flex-direction:column;}
.right{border-radius:0;}
}
</style>

</head>

<body>

<!-- LEFT SIDE -->

<div class="left">

<img src="logo.png" alt="Floraza Logo">

<h2>Floraza</h2>
<p>Empowering Farmers. Growing Future.</p>

</div>

<!-- RIGHT SIDE -->

<div class="right">
<div class="card">

<h2>Login</h2>

<select id="role">
<option>Admin</option>
<option>Marketing</option>
<option>Staff</option>
</select>

<input id="username" placeholder="Username">

<div class="pass">
<input type="password" id="password" placeholder="Password">
<span onclick="togglePass()">👁️</span>
</div>

<button onclick="login()">Login</button>

<p id="error"></p>

<a href="index.html" class="back">← Back to Home</a>

</div>
</div>

<script>

/* INIT DEFAULT USERS */
function initUsers(){

let users = JSON.parse(localStorage.getItem("users"));

if(!users || users.length === 0){

users = [
{username:"admin", password:"1234", role:"Admin"},
{username:"marketing", password:"1234", role:"Marketing"}
];

localStorage.setItem("users", JSON.stringify(users));
}

}

initUsers();

/* LOGIN FUNCTION */
function login(){

let role = document.getElementById("role").value;
let username = document.getElementById("username").value.trim();
let password = document.getElementById("password").value.trim();

let users = JSON.parse(localStorage.getItem("users")) || [];

let user = users.find(u =>
u.username === username &&
u.password === password &&
u.role === role
);

if(user){

localStorage.setItem("loggedIn","true");
localStorage.setItem("currentUser", JSON.stringify(user));

window.location.href = "dashboard.html";

}else{

document.getElementById("error").innerText =
"Invalid username or password";

}

}

/* SHOW PASSWORD */
function togglePass(){

let pass = document.getElementById("password");

pass.type = pass.type === "password" ? "text" : "password";

}

</script>

</body>
</html>
