<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Reports</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:230px;height:100vh;background:#2e7d32;
color:white;padding:20px;position:fixed;
}

.sidebar h2{margin-bottom:20px;}

.sidebar a{
display:block;color:white;text-decoration:none;
margin:10px 0;padding:10px;border-radius:8px;
}

.sidebar a:hover{background:#1b5e20;}

/* Main */
.main{margin-left:250px;padding:20px;width:100%;}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;
border-radius:10px;text-align:center;
margin-bottom:20px;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;margin-bottom:20px;
}

.card{
background:white;padding:20px;border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card p{font-size:22px;color:#2e7d32;font-weight:bold;}

/* Box */
.box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">
<h2>🌱 Floraza</h2>
<a href="dashboard.html">Dashboard</a>
<a href="sales.html">Sales</a>
<a href="delivery.html">Delivery</a>
<a href="inventory.html">Inventory</a>
<a href="reports.html">Reports</a>
</div>

<!-- Main -->

<div class="main">

<div class="header">📊 Business Reports</div>

<!-- Summary -->

<div class="cards">
<div class="card"><h3>Total Sales</h3><p id="sales">0</p></div>
<div class="card"><h3>Total Commission</h3><p id="commission">0</p></div>
<div class="card"><h3>Total Orders</h3><p id="orders">0</p></div>
<div class="card"><h3>Total Delivered</h3><p id="delivered">0</p></div>
<div class="card"><h3>Total Stock</h3><p id="stock">0</p></div>
</div>

<!-- Charts -->

<div class="box">
<h3>📊 Sales vs Commission</h3>
<canvas id="barChart"></canvas>
</div>

<div class="box">
<h3>📦 Product Distribution</h3>
<canvas id="pieChart"></canvas>
</div>

</div>

<script>

/* Protect Page */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* Load Data */
let sales = parseInt(localStorage.getItem("salesTotal")) || 0;
let commission = parseInt(localStorage.getItem("commissionTotal")) || 0;
let orders = parseInt(localStorage.getItem("ordersTotal")) || 0;
let delivered = parseInt(localStorage.getItem("deliveredTotal")) || 0;

let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let totalStock = 0;

for(let key in inventory){
totalStock += inventory[key];
}

/* Update UI */
document.getElementById("sales").innerText = sales;
document.getElementById("commission").innerText = commission;
document.getElementById("orders").innerText = orders;
document.getElementById("delivered").innerText = delivered;
document.getElementById("stock").innerText = totalStock;

/* BAR CHART */
new Chart(document.getElementById("barChart"), {
type: 'bar',
data: {
labels: ['Sales', 'Commission', 'Orders', 'Delivered'],
datasets: [{
label: 'Business Data',
data: [sales, commission, orders, delivered],
borderWidth: 1
}]
}
});

/* PIE CHART (Products) */
let productCount = {
"Nutri Jack": 0,
"Plant": 0,
"Humate": 0,
"Seaweed": 0
};

let salesData = JSON.parse(localStorage.getItem("salesData")) || [];

salesData.forEach(s=>{
if(s.name.includes("Nutri")) productCount["Nutri Jack"] += s.qty;
if(s.name.includes("Plant")) productCount["Plant"] += s.qty;
if(s.name.includes("Humate")) productCount["Humate"] += s.qty;
if(s.name.includes("Seaweed")) productCount["Seaweed"] += s.qty;
});

new Chart(document.getElementById("pieChart"), {
type: 'pie',
data: {
labels: Object.keys(productCount),
datasets: [{
data: Object.values(productCount)
}]
}
});

</script>

</body>
</html>
