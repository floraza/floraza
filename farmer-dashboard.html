<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Dashboard</title>

<style>
body { margin: 0; font-family: Arial; display: flex; }

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #2e7d32;
    color: white;
    padding: 20px;
}

.sidebar h2 { margin-bottom: 30px; }

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
    margin-bottom: 10px;
}

.sidebar a:hover {
    background: #1b5e20;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
    background: #f4f6f8;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 220px;
}

/* PROFILE */
.profile {
    display: flex;
    align-items: center;
    gap: 15px;
}

.profile img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
}

/* FORM */
.form-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}

button {
    padding: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    cursor: pointer;
}

/* LIST */
.item {
    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Farmer Panel</h2>
    <a href="#">Dashboard</a>
    <a href="#">My Farm</a>
    <a href="#">Orders</a>
    <a href="#">Payouts</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Farmer Dashboard 🌱</h2>

<!-- PROFILE -->
<div class="card">
    <div class="profile">
        <img id="farmerPhoto" src="">
        <div>
            <h3 id="farmerName"></h3>
            <p>Area: <span id="farmerArea"></span> acres</p>
            <p>Plants: <span id="farmerPlants"></span></p>
        </div>
    </div>
</div>

<!-- SUMMARY -->
<div class="cards">
    <div class="card">Total Orders <span id="totalOrders"></span></div>
    <div class="card">Total Earnings ₹<span id="earnings"></span></div>
    <div class="card">Total Payout ₹<span id="payout"></span></div>
</div>

<!-- HARVEST -->
<div class="form-box">
<h3>Add Harvest</h3>
<input id="harvestQty" type="number" placeholder="Harvest Qty (kg)">
<button onclick="addHarvest()">Save</button>
</div>

<!-- LISTS -->
<div id="orderList"></div>
<div id="harvestList"></div>
<div id="payoutList"></div>

</div>

<script>

let farmers = JSON.parse(localStorage.getItem("farmers")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let payouts = JSON.parse(localStorage.getItem("payouts")) || [];
let harvest = JSON.parse(localStorage.getItem("harvest")) || [];

/* DEMO: SELECT FIRST FARMER */
let currentFarmer = farmers[0] || {};

/* ADD HARVEST */
function addHarvest(){
harvest.push({
name: currentFarmer.name,
qty: Number(harvestQty.value),
date: new Date()
});
localStorage.setItem("harvest",JSON.stringify(harvest));
display();
}

/* DISPLAY */
function display(){

if(!currentFarmer.name) return;

farmerName.innerText = currentFarmer.name;
farmerArea.innerText = currentFarmer.area;
farmerPlants.innerText = currentFarmer.plants;
farmerPhoto.src = currentFarmer.photo || "";

let myOrders = orders.filter(o => o.customer === currentFarmer.name);
let myPayouts = payouts.filter(p => p.name === currentFarmer.name);

totalOrders.innerText = myOrders.length;

let earnings = myOrders.reduce((s,o)=>s+(o.qty*250),0);
earningsEl = document.getElementById("earnings");
earningsEl.innerText = earnings;

let payoutTotal = myPayouts.reduce((s,p)=>s+p.amount,0);
payout.innerText = payoutTotal;

/* LISTS */
orderList.innerHTML = "<h3>My Orders</h3>" + myOrders.map(o=>
`<div class="item">${o.product} (${o.qty})</div>`).join("");

harvestList.innerHTML = "<h3>Harvest</h3>" + harvest.filter(h=>h.name===currentFarmer.name).map(h=>
`<div class="item">${h.qty} kg</div>`).join("");

payoutList.innerHTML = "<h3>Payouts</h3>" + myPayouts.map(p=>
`<div class="item">₹${p.amount} (${p.status})</div>`).join("");
}

display();

</script>

</body>
</html>
