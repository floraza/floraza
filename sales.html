<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Sales</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6f9;}

/* Sidebar */
.sidebar{
width:240px;height:100vh;background:#2e7d32;color:white;padding:20px;position:fixed;
}
.logo-box{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.logo-box img{width:40px;}
.sidebar a{
display:block;color:white;text-decoration:none;margin:10px 0;padding:10px;border-radius:8px;
}
.sidebar a:hover{background:#1b5e20;}

/* Main */
.main{margin-left:260px;padding:20px;width:100%;}

/* Header */
.header{
background:#388e3c;color:white;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px;
}

/* Box */
.box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);margin-bottom:20px;
}

input,select{
padding:10px;margin:5px;width:200px;
}

/* Button */
button{
padding:10px 15px;background:#2e7d32;color:white;border:none;border-radius:8px;cursor:pointer;
}

/* Cards */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}
.card{
background:white;padding:20px;border-radius:15px;text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}
.card p{font-size:22px;color:#2e7d32;font-weight:bold;}

/* Table */
table{width:100%;border-collapse:collapse;}
th{background:#2e7d32;color:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:center;}
</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">
<div class="logo-box">
<img src="logo.png">
<h3>Floraza</h3>
</div>

<a href="dashboard.html">Dashboard</a> <a href="staff.html">Staff</a> <a href="farmers.html">Farmers</a> <a href="sales.html">Sales</a> <a href="delivery.html">Delivery</a> <a href="inventory.html">Inventory</a> <a href="mlm.html">MLM</a> <a href="gis-map.html">GIS Map</a> <a href="reports.html">Reports</a> <a href="settings.html">Settings</a>

</div>

<!-- Main -->

<div class="main">

<div class="header">💰 Sales Management</div>

<!-- Form -->

<div class="box">

<select id="product">
<option value="1750">Nutri Jack Powder</option>
<option value="250">Jackfruit Plant</option>
<option value="500">Potassium Humate</option>
<option value="400">Seaweed Gel</option>
</select>

<input type="number" id="qty" placeholder="Quantity">

<select id="staff"></select>

<button onclick="addSale()">Add Sale</button>

</div>

<!-- Summary -->

<div class="cards">
<div class="card"><h3>Total Sales ₹</h3><p id="totalSales">0</p></div>
<div class="card"><h3>Total Commission ₹</h3><p id="totalCommission">0</p></div>
</div>

<!-- Table -->

<div class="box">
<table>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Commission</th>
<th>Staff</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

/* PROTECT */
if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

/* LOAD STAFF */
let staffList = JSON.parse(localStorage.getItem("staff")) || [];
let staffDropdown = document.getElementById("staff");

if(staffList.length === 0){
staffDropdown.innerHTML = "<option>No Staff</option>";
}else{
staffList.forEach(s=>{
staffDropdown.innerHTML += `<option value="${s.username}">${s.username}</option>`;
});
}

/* DATA */
let sales = JSON.parse(localStorage.getItem("sales")) || [];

/* ADD SALE */
function addSale(){

let productSelect = document.getElementById("product");
let price = parseFloat(productSelect.value);
let name = productSelect.options[productSelect.selectedIndex].text;

let qty = parseInt(document.getElementById("qty").value);
let staff = document.getElementById("staff").value;

if(!qty || qty <= 0){
alert("Enter valid quantity");
return;
}

if(!staff || staff === "No Staff"){
alert("No staff available");
return;
}

/* INVENTORY CHECK */
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let key = name + "_Biraldinni Factory";

let currentStock = inventory[key] || 0;

if(currentStock < qty){
alert("Not enough stock! Available: " + currentStock);
return;
}

/* CALCULATE */
let amount = price * qty;
let commission = amount * 0.1;

/* SAVE SALE */
sales.push({name,qty,amount,commission,staff});
localStorage.setItem("sales", JSON.stringify(sales));

/* UPDATE INVENTORY */
inventory[key] = currentStock - qty;
localStorage.setItem("inventory", JSON.stringify(inventory));

/* AUTO DELIVERY */
let delivery = JSON.parse(localStorage.getItem("delivery")) || [];

delivery.push({
name: "Customer",
location: "Auto",
product: name,
qty: qty,
status: "Pending",
staff: staff
});

localStorage.setItem("delivery", JSON.stringify(delivery));

/* REFRESH */
loadSales();

/* CLEAR */
document.getElementById("qty").value="";
}

/* LOAD SALES */
function loadSales(){

let table = document.getElementById("table");
table.innerHTML = "";

let totalSales = 0;
let totalCommission = 0;

sales.forEach(s=>{

totalSales += Number(s.amount) || 0;
totalCommission += Number(s.commission) || 0;

table.innerHTML += `
<tr>
<td>${s.name}</td>
<td>${s.qty}</td>
<td>₹${s.amount}</td>
<td>₹${s.commission}</td>
<td>${s.staff}</td>
</tr>
`;
});

document.getElementById("totalSales").innerText = totalSales.toFixed(0);
document.getElementById("totalCommission").innerText = totalCommission.toFixed(0);

}

loadSales();

</script>

</body>
</html>
