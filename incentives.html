<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floraza Performance Incentives</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;background:#f4f6f9;}

.sidebar{
width:240px;height:100vh;background:#2e7d32;color:white;padding:20px;position:fixed;
}

.logo-box{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.logo-box img{width:40px;}

.sidebar a{
display:block;color:white;text-decoration:none;margin:10px 0;padding:10px;border-radius:8px;
}
.sidebar a:hover{background:#1b5e20;}

.main{margin-left:260px;padding:20px;width:100%;}

.header{
background:#388e3c;color:white;padding:15px;border-radius:10px;text-align:center;margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;margin-bottom:20px;
}

.card{
background:white;padding:20px;border-radius:15px;text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.box{
background:white;padding:20px;border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

table{width:100%;border-collapse:collapse;}
th{background:#2e7d32;color:white;}
th,td{padding:10px;border:1px solid #ddd;text-align:center;}
</style>

</head>

<body>

<div class="sidebar">
<div class="logo-box">
<img src="logo.png">
<h3>Floraza</h3>
</div>

<a href="dashboard.html">Dashboard</a> <a href="staff.html">Staff</a> <a href="farmers.html">Farmers</a> <a href="sales.html">Sales</a> <a href="delivery.html">Delivery</a> <a href="inventory.html">Inventory</a> <a href="incentives.html">Performance Incentives</a> <a href="activities.html">Activities</a> <a href="gis-map.html">GIS Map</a> <a href="reports.html">Reports</a> <a href="settings.html">Settings</a>

</div>

<div class="main">

<div class="header">💸 Performance Incentives</div>

<div class="cards">
<div class="card"><h4>Total</h4><p id="total">0</p></div>
<div class="card"><h4>Tier 1</h4><p id="t1">0</p></div>
<div class="card"><h4>Tier 2</h4><p id="t2">0</p></div>
<div class="card"><h4>Tier 3</h4><p id="t3">0</p></div>
<div class="card"><h4>Tier 4</h4><p id="t4">0</p></div>
<div class="card"><h4>Tier 5</h4><p id="t5">0</p></div>
</div>

<div class="box">
<table>
<tr>
<th>Tier</th>
<th>Product</th>
<th>Amount</th>
<th>Incentive</th>
<th>Staff</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

if(localStorage.getItem("loggedIn")!=="true"){
window.location.href="login.html";
}

let tiers=[0.1,0.05,0.03,0.01,0.01];

let sales=JSON.parse(localStorage.getItem("sales"))||[];

let totals=[0,0,0,0,0];

sales.forEach(s=>{
for(let i=0;i<5;i++){
let inc=s.amount*tiers[i];
totals[i]+=inc;

document.getElementById("table").innerHTML+=`
<tr>
<td>Tier ${i+1}</td>
<td>${s.name}</td>
<td>₹${s.amount}</td>
<td>₹${inc.toFixed(0)}</td>
<td>${s.staff}</td>
</tr>
`;
}
});

document.getElementById("t1").innerText=totals[0].toFixed(0);
document.getElementById("t2").innerText=totals[1].toFixed(0);
document.getElementById("t3").innerText=totals[2].toFixed(0);
document.getElementById("t4").innerText=totals[3].toFixed(0);
document.getElementById("t5").innerText=totals[4].toFixed(0);

let total=totals.reduce((a,b)=>a+b,0);
document.getElementById("total").innerText=total.toFixed(0);

</script>

</body>
</html>
